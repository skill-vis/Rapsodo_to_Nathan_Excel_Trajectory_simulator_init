            href: guides/statcast-mode.qmd
          - text: Manual Input
            href: guides/manual-mode.qmd
          - text: Rapsodo Input
            href: guides/rapsodo-mode.qmd
          - text: Overlay Comparison
            href: guides/overlay-comparison.qmd
          - text: "Batter's Eye"
            href: guides/batters-eye.qmd
          - text: Pitch Tunnel
            href: guides/pitch-tunnel.qmd
      - text: Concepts
        menu:
          - text: Spin & Movement
            href: concepts/spin-and-movement.qmd
          - text: Pitch Tunneling
            href: concepts/pitch-tunneling.qmd
